inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs

# terraform is BSL-licensed (unfree) — nixpkgs blocks unfree packages by
# default, so this needs to be explicit rather than a silent global default.
allowUnfree: true
